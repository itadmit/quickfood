<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickFood</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    background: #0a0a0a;
    width: 390px;
    height: 844px;
    overflow: hidden;
    position: relative;
  }

  #video-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.10) 30%,
      rgba(0,0,0,0.55) 70%,
      rgba(0,0,0,0.82) 100%
    );
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 52px 24px 40px;
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: auto;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: #fff;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon svg { width: 28px; height: 28px; }

  .logo-name {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }

  /* Main copy */
  .main-copy {
    margin-bottom: 28px;
  }

  .tagline {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 13px;
    color: #fff;
    margin-bottom: 16px;
    font-weight: 500;
  }

  .headline {
    font-size: 40px;
    font-weight: 900;
    line-height: 1.1;
    color: #fff;
    letter-spacing: -1px;
    margin-bottom: 14px;
  }

  .headline span {
    display: block;
  }

  .headline .highlight {
    background: #FFD023;
    color: #000;
    border-radius: 10px;
    padding: 2px 10px;
    display: inline-block;
  }

  .sub {
    font-size: 16px;
    color: rgba(255,255,255,0.82);
    line-height: 1.5;
    font-weight: 400;
  }

  /* Price badge */
  .price-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 18px;
  }

  .price-main {
    font-size: 34px;
    font-weight: 900;
    color: #FFD023;
    line-height: 1;
    letter-spacing: -1px;
  }

  .price-details {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .price-details .per-month {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
  }

  .price-details .commission {
    font-size: 15px;
    color: #fff;
    font-weight: 600;
  }

  .price-divider {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.2);
    margin: 0 4px;
  }

  .no-wolt {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }

  .no-wolt .crossed {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    text-decoration: line-through;
    font-weight: 500;
  }

  .no-wolt .saved {
    font-size: 13px;
    color: #4ade80;
    font-weight: 700;
  }

  /* CTA */
  .cta-btn {
    width: 100%;
    padding: 17px;
    background: #fff;
    color: #000;
    font-size: 17px;
    font-weight: 800;
    border: none;
    border-radius: 14px;
    text-align: center;
    cursor: pointer;
    letter-spacing: -0.2px;
  }

  .cta-sub {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 10px;
  }
</style>
</head>
<body>

<video id="video-bg" autoplay muted loop playsinline></video>
<div class="overlay"></div>

<div class="content">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a855f7"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <rect width="32" height="32" rx="8" fill="url(#g)"/>
        <text x="16" y="22.5" text-anchor="middle"
          font-family="'Pacifico','Brush Script MT',cursive"
          font-size="22" fill="#ffffff">F</text>
      </svg>
    </div>
    <span class="logo-name">QuickFood</span>
  </div>

  <div class="main-copy">
    <div class="tagline">אין עמלות. אין ביניים. רק עסק שלך.</div>
    <h1 class="headline">
      <span>הלקוחות שלך,</span>
      <span>הכסף שלך.</span>
      <span class="highlight">סוף לוולט.</span>
    </h1>
    <p class="sub">הזמנות ישירות לעסק שלך — בלי 30% לאפליקציות הגדולות.</p>
  </div>

  <div class="price-badge">
    <div>
      <div class="price-main">₪299</div>
    </div>
    <div class="price-details">
      <span class="per-month">לחודש בלבד</span>
      <span class="commission">+ 0.5% לעסקה</span>
    </div>
    <div class="price-divider"></div>
    <div class="no-wolt">
      <span class="crossed">וולט: 30%</span>
      <span class="saved">חוסכים אלפי ₪</span>
    </div>
  </div>

  <button class="cta-btn">QuickFood — פתחו לי חנות</button>
  <p class="cta-sub">ניסיון חינם · ללא כרטיס אשראי</p>
</div>

<script>
  const videos = [
    "https://videos.pexels.com/video-files/3209828/3209828-hd_1920_1080_25fps.mp4",
    "https://videos.pexels.com/video-files/4253935/4253935-uhd_2560_1440_25fps.mp4",
    "https://videos.pexels.com/video-files/3843965/3843965-hd_1920_1080_25fps.mp4",
    "https://videos.pexels.com/video-files/7456498/7456498-hd_1280_720_25fps.mp4",
    "https://videos.pexels.com/video-files/6966966/6966966-hd_1920_1080_25fps.mp4"
  ];

  const vid = document.getElementById('video-bg');
  vid.src = videos[Math.floor(Math.random() * videos.length)];
  vid.play().catch(() => {});
</script>
</body>
</html>
